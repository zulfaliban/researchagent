[server]
# Maximize performance and avoid watcher spam
folderWatchBlacklist = ["venv", ".venv", "tmp", "data", "corpus", "faiss_index"]
fileWatcherType = "none"

[browser]
gatherUsageStats = false

[client]
showErrorDetails = true

[theme]
primaryColor = "#FF4B4B"
backgroundColor = "#0E1117"
secondaryBackgroundColor = "#262730"
textColor = "#FAFAFA"
font = "sans serif"
