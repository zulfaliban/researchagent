[pytest]
# Suppress upstream FAISS SWIG DeprecationWarnings — not actionable in our code.
# SwigPyPacked, SwigPyObject, swigvarlink are internal SWIG C-extension types.
filterwarnings =
    ignore::DeprecationWarning:importlib.*

markers =
    integration: marks tests as integration tests requiring live API keys or R2 credentials (deselect with '-m "not integration"')
