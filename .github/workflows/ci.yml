name: CI - Validation

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    # Skip if commit message contains [skip ci]
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Install only the packages needed for tests (skip heavy GPU deps)
        pip install \
          streamlit>=1.50.0 \
          requests>=2.31.0 \
          feedparser>=6.0.10 \
          openai>=1.55.0 \
          sentence-transformers>=3.0.0 \
          pandas>=2.0.0 \
          groq>=0.9.0 \
          faiss-cpu>=1.7.4 \
          bm25s>=0.2.0 \
          tenacity>=8.2.3 \
          python-dotenv>=1.0.0 \
          boto3>=1.26.0 \
          pytest>=7.4.0 \
          pytest-mock>=3.12.0 \
          scikit-learn>=1.3.0 \
          numpy>=1.24.0

    - name: Write pytest.ini
      run: |
        cat > pytest.ini << 'EOF'
        [pytest]
        filterwarnings =
            ignore::DeprecationWarning:importlib.*
        markers =
            integration: marks tests as integration tests (deselect with '-m "not integration"')
        EOF
        
    - name: Syntax check
      run: |
        python -c "import ast; ast.parse(open('app.py').read()); print('app.py: syntax OK')"
        python -c "import ast; ast.parse(open('data_pipeline/scheduler.py').read()); print('scheduler.py: syntax OK')"
        python -c "import ast; ast.parse(open('data_pipeline/build_index.py').read()); print('build_index.py: syntax OK')"
        python -c "import ast; ast.parse(open('data_pipeline/fetch_corpus.py').read()); print('fetch_corpus.py: syntax OK')"
        
    - name: Run unit tests
      run: |
        # Only run unit tests, skip integration tests that require API keys/R2
        python -m pytest tests/ -m "not integration" -x -q --tb=short
